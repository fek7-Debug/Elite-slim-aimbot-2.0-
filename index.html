<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Slim Hub | Universal</title>
    <style>
        :root {
            /* Nuevo Tema Azul */
            --primary: #0088ff;
            --bg: #03080e;
            --card: #08121d;
            --text: #e0f0ff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Language Switcher */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
        }

        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a415a;
            color: #8da9c7;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .lang-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 136, 255, 0.1);
        }

        /* Container & Sections */
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #1a2a3a;
        }

        .title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 0.5rem;
            margin-top: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 136, 255, 0.4);
        }

        .desc {
            text-align: center;
            color: #8da9c7;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* Loadstring Box */
        .loadstring-box {
            background: #000408;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #1a2a3a;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            word-break: break-all;
            cursor: pointer;
            transition: 0.3s;
            color: #79caff;
        }

        .loadstring-box:hover {
            border-color: var(--primary);
            background: #00060c;
        }

        #copy-status {
            text-align: center;
            height: 25px;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary);
            visibility: hidden;
        }

        /* Explanatory Sections */
        .section-title {
            color: var(--primary);
            margin-top: 2rem;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #1a2a3a;
            padding-bottom: 10px;
        }

        .option-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #1a2a3a;
        }

        .option-name {
            font-weight: bold;
            color: #79caff;
            font-size: 1.1rem;
        }

        .option-desc {
            color: #8da9c7;
            margin-top: 5px;
            font-size: 0.95rem;
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #4c627a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 1.5rem; }
            .title { font-size: 2rem; }
            .section-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="lang-switch">
            <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-es" onclick="setLang('es')">Español</button>
        </div>

        <div class="container">
            <h1 class="title">Elite Slim Hub</h1>
            <p id="desc" class="desc">The ultimate universal script for Mobile & PC gaming.</p>
            
            <div class="loadstring-box" id="script-box" onclick="copyScript()">
                loadstring(game:HttpGet("https://raw.githubusercontent.com/fek7-Debug/Elite-slim-aimbot-2.0-/refs/heads/main/main.lua"))()
            </div>
            <div id="copy-status">✓ Copied to clipboard!</div>

            <h2 class="section-title" id="features-title">Hub Features Explained</h2>
            <ul class="option-list" id="option-list">
                </ul>

            <div class="footer" id="footer">
                V23 GLOBAL | ELITE SLIM TEAM
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                desc: "The ultimate universal script for Mobile & PC gaming.",
                copied: "✓ Copied to clipboard!",
                features: "Hub Features Explained",
                footer: "V23 GLOBAL | ELITE SLIM TEAM",
                options: [
                    { name: "Aimbot [🔫]", desc: "Automatically targets enemies. Includes prediction and smoothing." },
                    { name: "Aim Configs [⚙️]", desc: "Customize smoothness, prediction, FOV size, and filters like Wall Check." },
                    { name: "Slim Visuals [👁️]", desc: "ESP for Boxes, Health, Names, and Skeletons through walls." },
                    { name: "Performance [⚡]", desc: "In-game FPS & Ping monitors, and optimization tools." },
                    { name: "World [🌐]", desc: "Game modifications like Spin Bot and Infinite Jump." }
                ]
            },
            es: {
                desc: "El script universal definitivo para jugar en Móvil y PC.",
                copied: "✓ ¡Copiado al portapapeles!",
                features: "Explicación de las Opciones",
                footer: "V23 GLOBAL | ELITE SLIM TEAM",
                options: [
                    { name: "Aimbot [🔫]", desc: "Apunta automáticamente a los enemigos. Incluye predicción y suavizado." },
                    { name: "Aim Configs [⚙️]", desc: "Personaliza el suavizado, predicción, tamaño del FOV y filtros como Wall Check." },
                    { name: "Slim Visuals [👁️]", desc: "ESP para Cajas, Salud, Nombres y Esqueletos a través de paredes." },
                    { name: "Performance [⚡]", desc: "Monitores de FPS y Ping en tiempo real, y herramientas de optimización." },
                    { name: "World [🌐]", desc: "Modificaciones del mundo como Spin Bot y Salto Infinito." }
                ]
            }
        };

        let currentLang = 'en';

        function populateOptions(lang) {
            const list = document.getElementById('option-list');
            list.innerHTML = ''; // Clear current
            translations[lang].options.forEach(opt => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.innerHTML = `<div class="option-name">${opt.name}</div><div class="option-desc">${opt.desc}</div>`;
                list.appendChild(li);
            });
        }

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('desc').innerText = translations[lang].desc;
            document.getElementById('features-title').innerText = translations[lang].features;
            document.getElementById('footer').innerText = translations[lang].footer;
            document.getElementById('copy-status').style.visibility = 'hidden';
            
            populateOptions(lang);
            
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
        }

        function copyScript() {
            const scriptText = document.getElementById('script-box').innerText;
            navigator.clipboard.writeText(scriptText).then(() => {
                const status = document.getElementById('copy-status');
                status.innerText = translations[currentLang].copied;
                status.style.visibility = 'visible';
                setTimeout(() => {
                    status.style.visibility = 'hidden';
                }, 2500);
            });
        }

        // Initial setup
        setLang('en');
    </script>
</body>
</html>
